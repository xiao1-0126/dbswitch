name: BUG反馈、需求或问题咨询
description: "请尽可能详细的描述问题，提供足够的上下文"
body:
  - type: dropdown
    id: version
    attributes:
      label: dbswitch版本
      options:
        - "1.9.3"
        - "1.9.2"
        - "1.9.1"
        - "1.9.0"
        - "1.8.2"
        - "1.8.1"
        - "1.8.0"
        - "其他版本已不维护，勿提issue"
    validations:
      required: true
  - type: dropdown
    id: modify
    attributes:
      label: 是否进行了二次开发
      options:
        - "是"
        - "否"
    validations:
      required: true
  - type: textarea
    id: desired-solution
    attributes:
      label: 问题描述
      description: 详细描述问题，提供相应截图和日志，对于有堆栈报错信息，请提供完整的堆栈信息，对于一句话反馈的BUG将会被无视而关闭。
    validations:
      required: true
